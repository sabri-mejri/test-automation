name: Playwright Tests + QApilot

on:
  workflow_dispatch:
    inputs:
      qapilot_project_id:
        description: "QApilot project UUID"
        required: true
        type: string

env:
  QAPILOT_URL: https://qapilot-1.onrender.com
  QAPILOT_API_KEY: qp_62ba49edb8d2eeb3962907fbd03f4aa73f64e7de199a9a31b22e53806631a3ff
  QAPILOT_PROJECT_ID: ${{ inputs.qapilot_project_id }}

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create output directories
        run: mkdir -p reports screenshots

      - name: Run Playwright tests
        id: tests
        continue-on-error: true
        run: npx playwright test

      - name: Install QApilot CLI
        run: npm install -g qapilot-cli

      - name: Authenticate with QApilot
        run: |
          qapilot auth:set \
            --url "$QAPILOT_URL" \
            --api-key "$QAPILOT_API_KEY"

      - name: Submit test results to QApilot
        run: |
          qapilot run:submit \
            --project-id "$QAPILOT_PROJECT_ID" \
            --name "Playwright CI #${{ github.run_number }}" \
            --results reports/junit.xml \
            --attachments ./test-results \
            --source "github-actions" \
            --tags "playwright,automated,ci" \
            --description "Automated Playwright tests from commit ${{ github.sha }}"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 30

      - name: Upload test videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos
          path: test-results/
          retention-days: 30

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/html/
          retention-days: 30
